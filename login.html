<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>تسجيل الدخول | ملخصاتي</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary": "#ffffff",
            "primary": "#0050cb",
            "on-surface": "#111c2d",
            "on-surface-variant": "#424656",
            "surface": "#f9f9ff",
            "surface-container-low": "#f0f3ff",
            "surface-container-high": "#dee8ff",
            "outline-variant": "#c2c6d8",
            "error": "#ba1a1a"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          spacing: { "xs": "8px", "sm": "16px", "md": "24px", "base": "4px", "lg": "40px", "xl": "64px", "gutter": "24px", "container-max": "1280px" },
          fontFamily: { "display-lg": ["Cairo"], "headline-md": ["Cairo"], "display-lg-mobile": ["Cairo"], "caption": ["Cairo"], "body-md": ["Cairo"], "body-lg": ["Cairo"], "label-md": ["Cairo"], "headline-lg": ["Cairo"] },
          fontSize: {
            "display-lg": ["48px", { "lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
            "display-lg-mobile": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
            "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
            "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
            "headline-lg": ["30px", { "lineHeight": "38px", "fontWeight": "700" }]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #f9f9ff; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center px-gutter">
  <div class="w-full max-w-md">
    <div class="text-center mb-lg">
      <span class="font-display-lg text-display-lg font-black text-primary">ملخصاتي</span>
      <h1 class="font-headline-lg text-headline-lg mt-xs">تسجيل الدخول للمشرفين</h1>
      <p class="font-body-md text-body-md text-on-surface-variant mt-xs">ادخل بياناتك للوصول إلى لوحة التحكم.</p>
    </div>

    <form id="login-form" class="bg-white rounded-2xl shadow-[0_4px_20px_-2px_rgba(0,0,0,0.08)] p-md md:p-lg space-y-4 border border-outline-variant/30">
      <div id="login-error" class="hidden bg-error/10 text-error rounded-lg px-4 py-3 font-label-md text-label-md flex items-center gap-2"></div>

      <div>
        <label for="email" class="block font-label-md text-label-md text-on-surface-variant mb-1">البريد الإلكتروني</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline">person</span>
          <input id="email" name="email" type="email" autocomplete="email" required
            class="w-full pr-10 pl-4 py-2.5 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition font-body-md text-body-md">
        </div>
      </div>

      <div>
        <label for="password" class="block font-label-md text-label-md text-on-surface-variant mb-1">كلمة المرور</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full pr-10 pl-4 py-2.5 bg-surface-container-low border border-outline-variant/30 rounded-lg focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition font-body-md text-body-md">
        </div>
      </div>

      <button type="submit" id="login-btn"
        class="w-full px-6 py-3 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
        <span id="login-btn-label" class="flex items-center gap-2">
          <span class="material-symbols-outlined">login</span> دخول
        </span>
      </button>

      <a href="index.html" class="block text-center font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors">← العودة إلى الموقع</a>
    </form>
  </div>

  <script type="module">
    import { signIn } from './js/auth.js';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    const btnLabel = document.getElementById('login-btn-label');

    const setLoading = (loading) => {
      btn.disabled = loading;
      btnLabel.innerHTML = loading
        ? '<span class="material-symbols-outlined animate-spin">progress_activity</span> جارٍ الدخول...'
        : '<span class="material-symbols-outlined">login</span> دخول';
    };

    const showError = (message) => {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.add('hidden');
      setLoading(true);
      try {
        await signIn(document.getElementById('email').value, document.getElementById('password').value);
        window.location.href = 'admin.html';
      } catch (err) {
        showError(err.message || 'تعذر تسجيل الدخول.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
